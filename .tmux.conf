# force SHELL ENV variable as zsh, set color
# Use whichever zsh is on PATH (Homebrew or system); fall back to /usr/bin/zsh
run-shell 'for _p in /home/linuxbrew/.linuxbrew/bin/zsh "$HOME/.linuxbrew/bin/zsh" /usr/local/bin/zsh /bin/zsh; do [ -x "$_p" ] && tmux set-option -g default-shell "$_p" && break; done'
set -g default-terminal "screen-256color"

# Enable mouse mode for pane and window selection
set -g mouse on