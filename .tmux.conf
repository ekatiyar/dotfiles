# force SHELL ENV variable as zsh
# Use whichever zsh is on PATH (Homebrew or system); fall back to /usr/bin/zsh
run-shell 'tmux set-option -g default-shell "$(command -v zsh || echo /usr/bin/zsh)"'

# 24-bit truecolor - advertises the standard RGB terminfo capability to the outer terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"

# Extended keys (CSI u): let the terminal disambiguate Shift+Enter, Ctrl+Enter,
# Ctrl+I vs Tab, etc
set -s extended-keys on
set -as terminal-features "xterm*:extkeys"

# Let apps pass escape sequences through tmux to the outer terminal
set -g allow-passthrough on
set -g focus-events on

# Snappier ESC: don't wait to see if ESC begins a key chord (helps vim/TUIs).
set -sg escape-time 100

# Bigger scrollback
set -g history-limit 50000

# Enable OSC 52 System Clipboard integration
set -as terminal-features ",xterm-256color:clipboard"

# Enable modern clickable hyperlinks inside tmux panes
set -as terminal-features ",xterm-256color:hyperlinks"

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Intuitive split keys (open new pane in the same directory)
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Join a pane in side-by-side; prompts for a target like "2" (window 2's
# active pane) or "2.1" (window 2, pane 1). Ctrl-b q flashes pane numbers.
bind j command-prompt -p "join (window[.pane]):" "join-pane -h -s ':%%'"
# (break a pane back into its own window uses the default binding: Ctrl-b !)
